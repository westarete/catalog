version: 2

project_name: catalog

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: catalog
    env:
      # Pure Go — no cgo needed.
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      # Strip debug info and symbol table to reduce binary size.
      # Inject the release tag as the version string.
      - -s -w -X main.version={{.Version}}
    hooks:
      post:
        # Sign macOS binaries with the Developer ID Application certificate.
        # --options runtime is required for notarization compatibility.
        # Skipped on Linux and when the certificate name is not set.
        - cmd: sh -c 'if [ "{{ .Os }}" = "darwin" ] && [ -n "$MACOS_CERTIFICATE_NAME" ]; then codesign --force --options runtime -s "$MACOS_CERTIFICATE_NAME" "{{ .Path }}"; fi'

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE*
      - README.md

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

homebrew_casks:
  - name: catalog
    binaries:
      - catalog
    homepage: https://github.com/westarete/catalog
    # brew style requires: under 80 chars, no trailing period.
    description: Generates and maintains CATALOG.md for AI agent context loading
    repository:
      owner: westarete
      name: homebrew-tap
      branch: main
      # Fine-grained PAT with write access to both this repo and the tap repo.
      # Store as HOMEBREW_TAP_TOKEN in this repo's secrets.
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_author:
      name: goreleaserbot
    commit_msg_template: "Update catalog to {{ .Tag }}"
